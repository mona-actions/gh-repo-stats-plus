name: Continuous Integration

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  javascript-ci:
    runs-on: ubuntu-latest
    name: JavaScript CI

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        id: setup-node
        uses: actions/setup-node@v4
        with:
          node-version: '22.19.0'
          cache: npm

      - name: Install Dependencies
        id: npm-ci
        run: npm ci

      - name: Check Format
        id: npm-format-check
        run: npm run format:check

      - name: Lint
        id: npm-lint
        run: npm run lint

      - name: Build
        id: npm-build
        run: npm run package

      - name: Test
        id: npm-test
        run: npm run test:ci

      - name: Test Coverage
        id: npm-test-coverage
        run: npm run test:coverage

  action-shellcheck:
    runs-on: ubuntu-latest
    name: Action ShellCheck

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract shell scripts from action.yml
        id: extract
        run: |
          pip install pyyaml
          mkdir -p /tmp/scripts
          python3 -c "
          import yaml, os, re
          with open('action.yml') as f:
              data = yaml.safe_load(f)
          steps = data.get('runs', {}).get('steps', [])
          for i, step in enumerate(steps):
              run_block = step.get('run')
              if run_block:
                  # Replace GitHub Actions expressions with placeholder values
                  # so ShellCheck can analyze the actual bash logic
                  run_block = re.sub(r'\$\{\{[^}]*\}\}', 'PLACEHOLDER', run_block)
                  name = step.get('name', f'step-{i}').lower().replace(' ', '-')
                  path = f'/tmp/scripts/{i:02d}-{name}.sh'
                  with open(path, 'w') as out:
                      out.write('#!/usr/bin/env bash\n')
                      out.write(run_block)
                  print(f'Extracted: {path}')
          "

      - name: Run ShellCheck
        run: |
          if ls /tmp/scripts/*.sh 1>/dev/null 2>&1; then
            echo "Running ShellCheck on extracted scripts..."
            # SC2194: "This word is constant" — expected when GitHub Actions
            # expressions (${{ ... }}) are replaced with placeholders
            shellcheck --severity=warning --exclude=SC2194 /tmp/scripts/*.sh
          else
            echo "No shell scripts found to lint"
          fi

  action-yamllint:
    runs-on: ubuntu-latest
    name: Action YAML Lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint YAML files
        run: |
          pip install yamllint
          files="action.yml"
          while IFS= read -r file; do
            files="$files $file"
          done < <(find action/examples -type f \( -name '*.yml' -o -name '*.yaml' \) | sort)
          yamllint -c action/.yamllint.yml $files
